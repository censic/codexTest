name: Weekly holiday flight scan

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/flight-scan-trigger"
  schedule:
    # Tuesdays at 11:17 UTC: 7:17 a.m. EDT / 6:17 a.m. EST.
    # ChatGPT reads the committed report later Tuesday morning.
    - cron: "17 11 * * 2"

permissions:
  contents: write

concurrency:
  group: weekly-holiday-flight-scan
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 55
    env:
      SERPAPI_API_KEY: ${{ secrets.SERPAPI_API_KEY }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate SerpApi secret
        shell: bash
        run: |
          if [[ -z "$SERPAPI_API_KEY" ]]; then
            echo "::error::Repository secret SERPAPI_API_KEY is missing. Add it under Settings > Secrets and variables > Actions."
            exit 1
          fi
          if [[ ! "$SERPAPI_API_KEY" =~ ^[0-9a-fA-F]{64}$ ]]; then
            echo "::error::SERPAPI_API_KEY is present but is not in the expected 64-character hexadecimal format."
            exit 1
          fi
          echo "SERPAPI_API_KEY is present and has the expected format."

      - name: Run unit tests
        run: python -m unittest discover -s tests -v

      - name: Scan live fares
        run: python scripts/monitor.py

      - name: Commit updated report and history
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add REPORT.md data/latest.json data/history.jsonl
          if git diff --cached --quiet; then
            echo "No report changes to commit."
            exit 0
          fi
          git commit -m "Update weekly BOS-MCI flight report"
          git push
